<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <script>
    // Polyfill/Override to make window.fetch writable and configurable,
    // avoiding "Cannot set property fetch of #<Window> which has only a getter" errors.
    (function() {
      try {
        var originalFetch = window.fetch;
        if (originalFetch) {
          var currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return currentFetch; },
            set: function(val) { currentFetch = val; },
            configurable: true,
            enumerable: true
          });
        }
      } catch (e) {
        console.warn('Unable to redefine window.fetch:', e);
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cahier de Textes Interactif</title>

  <!-- PWA -->
  <meta name="theme-color" content="#0057D1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Cahier" />
  <!-- iOS ne supporte pas le SVG pour l'icône d'écran d'accueil : PNG 180 -->
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />

  <!-- Typographie unifiée : ronde et lisible pour l'interface, plus expressive
       pour les titres, avec une vraie fonte arabe et une monospace compacte. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&family=Fira+Sans+Condensed:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Roboto+Slab:wght@300..900&display=swap" rel="stylesheet">
</head>
